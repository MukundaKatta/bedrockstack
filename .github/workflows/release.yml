name: release

# Trusted Publishing to PyPI on tagged releases.
#
# One-time setup on PyPI:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher" with:
#        - PyPI Project Name: <project>
#        - Owner:             MukundaKatta
#        - Repository:        <repo>
#        - Workflow filename: release.yml
#        - Environment:       pypi
#   3. After the first successful publish, the pending publisher
#      becomes a regular trusted publisher tied to this exact workflow.
#
# Trigger: push a tag matching v*.
#   git tag v0.1.1 -m "v0.1.1"
#   git push --tags

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build
        run: pip install --upgrade build
      - name: build
        run: python -m build --sdist --wheel --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (Trusted Publisher)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    permissions:
      id-token: write   # required for Trusted Publishing OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Skip if the version already exists (re-running on the same tag).
          skip-existing: true
